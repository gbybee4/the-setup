[general]
import = ["~/.config/alacritty/themes/dracula/alacritty-master/dracula.toml"]

[colors.primary]
background = "#1c1c1c"

[env]
TERM = "xterm-256color"

[font]
size = 12.0
offset.y = -3

[font.normal]
family = "JetBrainsMono Nerd Font"

[keyboard]
bindings = [
  { key = "PageUp", mods = "Shift", action = "ScrollPageUp" },
  { key = "PageDown", mods = "Shift", action = "ScrollPageDown" }
]

