---
- name: Set global git config
  community.general.git_config:
    scope: global
    name: "{{ item.name }}"
    value: "{{ item.value }}"
  loop:
    - { name: core.editor, value: "nvim" }
    - { name: push.default, value: "current" }
    - { name: pull.rebase, value: "true" }
    - { name: rebase.autoSquash, value: "true" }

- name: Set git aliases
  community.general.git_config:
    scope: global
    name: "alias.{{ item.name }}"
    value: "{{ item.value }}"
  loop:
    - { name: a, value: "add -u" }
    - { name: ll, value: "log --oneline --graph --decorate --all" }
    - { name: amend, value: "commit --amend --no-edit" }
    - { name: fixup, value: "commit --fixup" }
    - { name: pushf, value: "push --force-with-lease" }
