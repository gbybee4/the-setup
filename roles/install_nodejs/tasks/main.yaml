---
- name: Add NodeSource GPG keyring
  ansible.builtin.apt_key:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    state: present
  become: true

- name: Add NodeSource repo
  ansible.builtin.apt_repository:
    repo: "deb https://deb.nodesource.com/node_{{ install_nodejs_major_version }}.x nodistro main"
    state: present
    filename: nodesource
    mode: "644"
  become: true

- name: Install node
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true
  become: true

- name: Install global npm packages
  community.general.npm:
    name: "{{ item }}"
    global: true
  loop: "{{ install_nodejs_global_packages }}"
  become: true
